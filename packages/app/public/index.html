<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monorepo App</title>
  <style>
    #app { margin-top: 1rem; }
    #app .demo { margin-bottom: 1rem; }
    #app button { padding: 0.5rem 1rem; cursor: pointer; }
    #app .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; max-width: 320px; }
    .demo-panel { background: #f0f7ff; border: 1px solid #b8d4f0; border-radius: 8px; padding: 12px 16px; margin-bottom: 1rem; }
    .demo-panel-header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .demo-panel-badge { font-weight: 600; color: #1a5fb4; }
    .demo-panel-mode { color: #2e7d32; font-size: 0.95rem; }
    .demo-btn { padding: 6px 12px; background: #1a5fb4; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .demo-btn:hover { background: #3584e4; }
    .demo-tip { margin-top: 12px; padding-top: 12px; border-top: 1px solid #b8d4f0; font-size: 14px; line-height: 1.5; color: #333; }
    .demo-tip p { margin: 6px 0; }
    .demo-tip-cmd { font-family: ui-monospace, monospace; font-size: 13px; background: #fff; padding: 8px; border-radius: 4px; }
    .demo-tip-small { font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <h1>Monorepo 工程化 demo</h1>
  <div id="app"></div>
  <script src="/main.js"></script>
</body>
</html>
